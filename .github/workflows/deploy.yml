name: Build & Deploy to CapRover

on:
  push:
    branches:       
        - main
        - development
        
  workflow_dispatch: # permite lanzarlo manualmente desde GitHub

jobs:
  build-and-deploy:
    name: Build image & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # necesario para subir a ghcr.io

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Login al GitHub Container Registry (ghcr.io) ───────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Construir el nombre de la imagen ────────────────────────────────
      #    Formato: ghcr.io/<owner>/<repo>:<sha corto>
      - name: Set image name
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          SHA="${{ github.sha }}"
          echo "IMAGE_NAME=${IMAGE}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${IMAGE}:${SHA::7}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=${IMAGE}:latest" >> $GITHUB_ENV

      # ── 4. Configurar Docker Buildx (multi-platform / caché) ───────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Build & Push ────────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_LATEST }}
          # Cache entre runs usando ghcr.io como backend
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      # ── 6. Deploy a CapRover ───────────────────────────────────────────────
      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_SERVER }}   # https://captain.tudominio.com
          app:    ${{ secrets.CAPROVER_APP }}       # nombre exacto de la app en CapRover
          token:  ${{ secrets.CAPROVER_APP_TOKEN }} # token de la pestaña Deployment
          image:  ${{ env.IMAGE_TAG }}